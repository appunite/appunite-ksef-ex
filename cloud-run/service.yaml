apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: ksef-hub
  labels:
    cloud.googleapis.com/location: europe-west1
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/container-dependencies: '{"ksef-hub":["pdf-renderer","invoice-extractor","invoice-classifier"]}'
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 80
      serviceAccountName: ksef-hub-runner@au-ksef-ex.iam.gserviceaccount.com
      containers:
        # --- Main application (ingress) ---
        - name: ksef-hub
          image: IMAGE_PLACEHOLDER
          ports:
            - name: http1
              containerPort: 4000
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
          startupProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4000
            periodSeconds: 30
            failureThreshold: 3
          env:
            - name: PHX_SERVER
              value: "true"
            - name: PHX_HOST
              value: "invoices.appunite.com"
            - name: KSEF_API_URL
              value: "https://api.ksef.mf.gov.pl"
            - name: PDF_RENDERER_URL
              value: "http://localhost:3001"
            - name: POOL_SIZE
              value: "5"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: database-url
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: secret-key-base
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: google-client-id
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: google-client-secret
            - name: CREDENTIAL_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: credential-encryption-key
            - name: MAILGUN_DOMAIN
              value: "mg.payroll.appunite.co"
            - name: INBOUND_EMAIL_DOMAIN
              value: "mg.payroll.appunite.co"
            - name: INVOICE_EXTRACTOR_URL
              value: "http://localhost:3002"
            - name: INVOICE_CLASSIFIER_URL
              value: "http://localhost:3003"
            - name: MAILGUN_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: mailgun-signing-key
            - name: MAILGUN_API_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: mailgun-api-key
            - name: INVOICE_EXTRACTOR_API_TOKEN
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: invoice-extractor-api-token
            - name: INVOICE_CLASSIFIER_API_TOKEN
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: invoice-classifier-api-token

        # --- Invoice extractor sidecar (PDF → structured JSON) ---
        - name: invoice-extractor
          image: europe-west1-docker.pkg.dev/au-ksef-ex/ksef-hub/invoice-extractor:latest
          env:
            - name: PORT
              value: "3002"
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: invoice-extractor-api-token
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: anthropic-api-key
            - name: ANTHROPIC_MODEL
              value: "claude-sonnet-4-5-20250929"
          resources:
            limits:
              memory: 256Mi
              cpu: "0.5"
          startupProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10

        # --- PDF renderer sidecar (PDF + HTML generation) ---
        - name: pdf-renderer
          image: europe-west1-docker.pkg.dev/au-ksef-ex/ksef-hub/ksef-pdf:latest
          resources:
            limits:
              memory: 256Mi
              cpu: "0.5"
          startupProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 5

        # --- Invoice classifier sidecar (LightGBM category/tag prediction) ---
        - name: invoice-classifier
          image: europe-west1-docker.pkg.dev/au-ksef-ex/ksef-hub/invoice-classifier:latest
          env:
            - name: PORT
              value: "3003"
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  key: latest
                  name: invoice-classifier-api-token
          resources:
            limits:
              memory: 1Gi
              cpu: "1"
          startupProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: ml-models
              mountPath: /app/models
              readOnly: true
      volumes:
        - name: ml-models
          csi:
            driver: gcsfuse.run.googleapis.com
            readOnly: true
            volumeAttributes:
              bucketName: au-ksef-ex-ml-models
