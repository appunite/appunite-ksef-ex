<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:18px;background:var(--background);color:var(--foreground);font-family:var(--font-sans)}
  .card{border:1px solid var(--border);border-radius:.75rem;background:var(--card);padding:20px}
  .hd{display:flex;justify-content:space-between;align-items:baseline;padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:12px}
  .t{font-size:16px;font-weight:600}
  .s{font-size:12px;color:var(--muted-foreground)}
  table{width:100%;font-size:13px;border-collapse:collapse}
  td{padding:6px 0;border-bottom:1px solid color-mix(in oklch,var(--border) 50%,transparent)}
  td:first-child{color:var(--muted-foreground)}
  td:last-child{text-align:right;font-family:var(--font-mono)}
  .strong{font-weight:700}
</style></head><body>
<div class="card">
  <div class="hd"><div><div class="t">Invoice FV/2026/01/0017</div><div class="s">Pending · expense</div></div><div class="s">2026-01-14</div></div>
  <table><tbody>
    <tr><td>Seller</td><td>Appunite sp. z o.o.</td></tr>
    <tr><td>NIP</td><td>PL9721241997</td></tr>
    <tr><td>Netto</td><td>18 450.00 PLN</td></tr>
    <tr><td>Brutto</td><td class="strong">22 693.50 PLN</td></tr>
  </tbody></table>
</div>
</body></html>
