<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:20px;background:var(--background);color:var(--foreground);font-family:var(--font-sans)}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
  .sw{display:flex;flex-direction:column;gap:4px;width:150px}
  .chip{height:72px;border-radius:var(--radius);border:1px solid var(--border)}
  .name{font-size:12px;font-weight:500}
  .meta{font-size:10px;color:var(--muted-foreground);font-family:var(--font-mono)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--brand)"></div><div class="name">brand (teal)</div><div class="meta">oklch(52% .09 185)</div></div>
  <div class="sw"><div class="chip" style="background:var(--brand-muted)"></div><div class="name">brand-muted</div><div class="meta">surface tint</div></div>
  <div class="sw"><div class="chip" style="background:var(--brand-strong)"></div><div class="name">brand-strong</div><div class="meta">press / deep</div></div>
  <div class="sw"><div class="chip" style="background:var(--brand);display:flex;align-items:center;justify-content:center;color:var(--brand-foreground);font-weight:600;font-size:13px">Synced ✓</div><div class="name">on brand</div><div class="meta">marketing CTA</div></div>
</div>
</body></html>
