<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:20px;background:var(--background);color:var(--foreground);font-family:var(--font-sans)}
  .row{display:grid;grid-template-columns:repeat(8,1fr);gap:14px}
  .i{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:var(--muted-foreground);font-family:var(--font-mono)}
  svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
</style></head><body>
<div class="row">
  <div class="i"><svg viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m-6-8h6M6 4h12a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2z"/></svg>document-text</div>
  <div class="i"><svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="12" rx="2"/><circle cx="12" cy="12" r="2"/></svg>banknotes</div>
  <div class="i"><svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg>home</div>
  <div class="i"><svg viewBox="0 0 24 24"><path d="M4 21V5a2 2 0 012-2h12a2 2 0 012 2v16M9 8h6M9 12h6M9 16h6"/></svg>building-office</div>
  <div class="i"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 01-14 0 7 7 0 0114 0zM12 2v2M12 20v2M2 12h2M20 12h2"/></svg>cog</div>
  <div class="i"><svg viewBox="0 0 24 24"><path d="M4 12a8 8 0 0115-3m1 3a8 8 0 01-15 3M20 4v5h-5M4 20v-5h5"/></svg>arrow-path</div>
  <div class="i"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"/><path d="M20 20l-4-4"/></svg>search</div>
  <div class="i"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>calendar</div>
  <div class="i"><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>chevron-down</div>
  <div class="i"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>x-mark</div>
  <div class="i"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>info</div>
  <div class="i"><svg viewBox="0 0 24 24"><path d="M12 3l10 18H2L12 3zM12 10v4M12 18h.01"/></svg>warning</div>
  <div class="i"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6"/></svg>error</div>
  <div class="i"><svg viewBox="0 0 24 24"><path d="M9 14l-5-5 5-5M4 9h11a5 5 0 015 5v6"/></svg>uturn-left</div>
  <div class="i"><svg viewBox="0 0 24 24"><rect x="5" y="3" width="12" height="18" rx="2"/><rect x="9" y="7" width="12" height="14" rx="2" fill="var(--background)"/></svg>duplicate</div>
  <div class="i"><svg viewBox="0 0 24 24"><path d="M10 17l5-5-5-5M15 12H4M12 3h7a2 2 0 012 2v14a2 2 0 01-2 2h-7"/></svg>logout</div>
</div>
</body></html>
