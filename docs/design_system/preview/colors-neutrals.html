<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:20px;background:var(--background);color:var(--foreground);font-family:var(--font-sans)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .sw{display:flex;flex-direction:column;gap:4px;width:110px}
  .chip{height:56px;border-radius:var(--radius);border:1px solid var(--border)}
  .name{font-size:11px;font-weight:500}
  .meta{font-size:10px;color:var(--muted-foreground);font-family:var(--font-mono)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--background)"></div><div class="name">background</div><div class="meta">oklch 100%</div></div>
  <div class="sw"><div class="chip" style="background:var(--foreground)"></div><div class="name">foreground</div><div class="meta">oklch 14.1%</div></div>
  <div class="sw"><div class="chip" style="background:var(--muted)"></div><div class="name">muted</div><div class="meta">oklch 96.7%</div></div>
  <div class="sw"><div class="chip" style="background:var(--muted-foreground)"></div><div class="name">muted-fg</div><div class="meta">oklch 55.6%</div></div>
  <div class="sw"><div class="chip" style="background:var(--border)"></div><div class="name">border</div><div class="meta">oklch 92.2%</div></div>
  <div class="sw"><div class="chip" style="background:var(--primary)"></div><div class="name">primary</div><div class="meta">zinc-900</div></div>
</div>
</body></html>
