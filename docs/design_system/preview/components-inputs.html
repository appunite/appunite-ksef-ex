<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:18px;background:var(--background);color:var(--foreground);font-family:var(--font-sans)}
  .f{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;max-width:340px}
  .lbl{font-size:13px;font-weight:500}
  .inp{height:36px;border:1px solid var(--input);background:var(--background);border-radius:.375rem;padding:0 12px;font-size:14px;color:var(--foreground);outline:none;font-family:inherit}
  .inp:focus{box-shadow:0 0 0 1px var(--ring)}
  .err{border-color:var(--destructive)}
  .errtxt{color:var(--destructive);font-size:12px;display:flex;align-items:center;gap:6px}
</style></head><body>
<div class="f"><label class="lbl">NIP</label><input class="inp" value="5252457316"></div>
<div class="f"><label class="lbl">Invoice number</label><input class="inp" placeholder="FV/2026/01/0017"></div>
<div class="f"><label class="lbl">Email</label><input class="inp err" value="not-an-email"><span class="errtxt">⚠ must be a valid email</span></div>
</body></html>
