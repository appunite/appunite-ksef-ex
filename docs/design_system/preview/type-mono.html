<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:20px;background:var(--background);color:var(--foreground);font-family:var(--font-sans)}
  .row{display:flex;gap:24px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
  .row:last-child{border:0}
  .label{font-size:10px;color:var(--muted-foreground);font-family:var(--font-mono);width:120px;flex-shrink:0}
  .mono{font-family:var(--font-mono)}
  .upper{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-foreground)}
</style></head><body>
<div class="row"><div class="label">mono 14 / 400</div><div class="mono">PL5252457316</div><div class="mono" style="color:var(--muted-foreground)">4242-KSEF-2026-00017</div></div>
<div class="row"><div class="label">mono bold 14</div><div class="mono" style="font-weight:700">18 450.00 PLN</div></div>
<div class="row"><div class="label">mono 12</div><div class="mono" style="font-size:12px">PL61 1090 1014 0000 0712 1981 2874</div></div>
<div class="row"><div class="label">label-upper 11</div><div class="upper">Buyer · Seller · Netto · Brutto</div></div>
<div class="row"><div class="label">small 12</div><div style="font-size:12px;color:var(--muted-foreground)">Predicted with 87.3% probability, feel free to adjust</div></div>
</body></html>
