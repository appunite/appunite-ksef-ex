services:
  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ksef_hub_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  pdf-renderer:
    image: ghcr.io/appunite/ksef-pdf:latest
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  invoice-extractor:
    image: ghcr.io/appunite/au-ksef-unstructured:v0.1.0
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - API_TOKEN=${INVOICE_EXTRACTOR_API_TOKEN}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  invoice-classifier:
    image: ghcr.io/appunite/au-payroll-model-categories:latest
    ports:
      - "3003:3003"
    volumes:
      - ./ml-models:/app/models:ro
    environment:
      - PORT=3003
      - API_TOKEN=${INVOICE_CLASSIFIER_API_TOKEN}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
