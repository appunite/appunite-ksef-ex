# Dependabot keeps the landing's npm deps and all GitHub Actions pinned.
# Elixir/Mix deps for the Phoenix app are tracked separately (not here).

version: 2
updates:
  # Landing static site (Astro + Tailwind + plugins)
  - package-ecosystem: npm
    directory: /landing
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Warsaw
    open-pull-requests-limit: 5
    groups:
      astro:
        patterns:
          - astro
          - "@astrojs/*"
      tailwind:
        patterns:
          - tailwindcss
          - "@tailwindcss/*"
      dev-tooling:
        dependency-type: development
    ignore:
      # TypeScript 6 is blocked until @astrojs/check / @astrojs/language-server
      # widens its peer range (currently typescript@^5). Re-enable by removing
      # this entry once the Astro tooling publishes a TS 6-compatible release.
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]
      # Astro 6 ships a newer Vite (rolldown-vite) whose plugin-config shape
      # (BindingViteResolvePluginConfig.resolveOptions now requires
      # tsconfigPaths) breaks @tailwindcss/vite@4.2.3 at build time — the
      # tailwind + astro groups bump independently, so a lone astro major
      # has no way to succeed until the tailwind Vite plugin catches up.
      # Re-enable by removing this entry once @tailwindcss/vite releases a
      # version compatible with Astro 6's Vite.
      - dependency-name: astro
        update-types: ["version-update:semver-major"]
      - dependency-name: "@astrojs/*"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
      - landing
    commit-message:
      prefix: "chore(landing)"
      include: scope

  # GitHub Actions used across .github/workflows/*
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"
      include: scope
